<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard QA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="header">
  <h1>📊 Dashboard QA <span id="tituloProyecto" class="proyecto-titulo"></span></h1>
  <img class="logo"
       src="https://raw.githubusercontent.com/pcesar80/reporte_issues_QA/main/LogoCMA.png"
       crossOrigin="anonymous">
</div>

<div class="separador_A"></div>

<div class="barra-superior">
  <input type="file" id="fileInput" accept=".csv">
  <button onclick="cargarDesdeOpenProject()">🔄 Cargar desde OpenProject</button>

  <div class="panel-derecho">
    <div class="filtro-version">
      <label><b>Versión:</b></label>
      <select id="filtroVersion"></select>
    </div>
    <button onclick="exportarPDF()">📄 Exportar PDF</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-button active" onclick="showView('mainView', this)">Indicadores / Top 5</button>
  <button class="tab-button" onclick="showView('noDateView', this)">Issues sin fecha</button>
  <button class="tab-button" onclick="showView('allIssuesView', this)">Todos los issues</button>
</div>

<div id="mainView" class="view active">
  <div class="separador_B"></div>

  <h2>📌 Top 5 tareas más antiguas</h2>
  <div class="card">
    <table id="topTareas">
      <thead>
        <tr><th>ID</th><th>Asunto</th><th>Estado</th><th>Días abierta</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <h2>📊 Indicadores</h2>
  <div class="grid-kpi">
    <div class="card"><h3>Estado</h3><table id="tablaEstado"></table></div>
    <div class="card"><h3>Severidad</h3><table id="tablaSeveridad"></table></div>
    <div class="card"><h3>Prioridad</h3><table id="tablaPrioridad"></table></div>
  </div>

  <h2>📊 Gráficos</h2>
  <div class="grid-graficos">
    <div class="card"><canvas id="estadoChart"></canvas></div>
    <div class="card"><canvas id="severidadChart"></canvas></div>
    <div class="card"><canvas id="prioridadChart"></canvas></div>
  </div>

  <h2>📈 Tiempo por asignado</h2>
  <div class="card">
    <canvas id="tiempoChart" style="height:300px !important;"></canvas>
  </div>
</div>

<div id="noDateView" class="view">
  <h2>⚠️ Issues sin fecha</h2>
  <div class="card">
    <table id="tablaSinFecha">
      <thead><tr><th>ID</th><th>Versión</th><th>Estado</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="allIssuesView" class="view">
  <h2>📋 Todos los issues</h2>
  <div class="card">
    <table id="tablaTodos">
      <thead><tr><th>ID</th><th>Descripción</th><th>Estado</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="js/parser.js"></script>
<script src="js/ui.js"></script>
<script src="js/charts.js"></script>
<script src="js/export.js"></script>
<script src="js/main.js"></script>

</body>
</html>
